services:
  # --- Infrastructure ---
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-bns}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Set MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-bns}
    volumes:
      - mongo_data:/data/db
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-production}
    volumes:
      - meili_data:/meili_data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- Application ---
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URI: ${DATABASE_URI:-mongodb://${MONGO_USER:-bns}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB:-bns}?authSource=admin}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?Set PAYLOAD_SECRET}
      PAYLOAD_ALLOWED_ORIGINS: ${PAYLOAD_ALLOWED_ORIGINS:-https://buynsellem.com,https://www.buynsellem.com}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTPS
      - "traefik.http.routers.bns-api.rule=Host(`api.buynsellem.com`)"
      - "traefik.http.routers.bns-api.entrypoints=websecure"
      - "traefik.http.routers.bns-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bns-api.service=bns-api"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.bns-api-http.rule=Host(`api.buynsellem.com`)"
      - "traefik.http.routers.bns-api-http.entrypoints=web"
      - "traefik.http.routers.bns-api-http.middlewares=bns-redirect-https"
      - "traefik.http.middlewares.bns-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.bns-redirect-https.redirectscheme.permanent=true"
      - "traefik.http.services.bns-api.loadbalancer.server.port=3000"

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.buynsellem.com
      NEXT_PUBLIC_CHAT_URL: https://chat.buynsellem.com
    depends_on:
      - api
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTPS
      - "traefik.http.routers.bns-web.rule=Host(`buynsellem.com`) || Host(`www.buynsellem.com`)"
      - "traefik.http.routers.bns-web.entrypoints=websecure"
      - "traefik.http.routers.bns-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bns-web.service=bns-web"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.bns-web-http.rule=Host(`buynsellem.com`) || Host(`www.buynsellem.com`)"
      - "traefik.http.routers.bns-web-http.entrypoints=web"
      - "traefik.http.routers.bns-web-http.middlewares=bns-redirect-https"
      - "traefik.http.services.bns-web.loadbalancer.server.port=3001"

  chat-service:
    build:
      context: .
      dockerfile: packages/chat-service/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      PAYLOAD_API_URL: http://api:3000/api
      CORS_ORIGIN: https://buynsellem.com,https://www.buynsellem.com
      PORT: 4000
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTPS
      - "traefik.http.routers.bns-chat.rule=Host(`chat.buynsellem.com`)"
      - "traefik.http.routers.bns-chat.entrypoints=websecure"
      - "traefik.http.routers.bns-chat.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bns-chat.service=bns-chat"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.bns-chat-http.rule=Host(`chat.buynsellem.com`)"
      - "traefik.http.routers.bns-chat-http.entrypoints=web"
      - "traefik.http.routers.bns-chat-http.middlewares=bns-redirect-https"
      - "traefik.http.services.bns-chat.loadbalancer.server.port=4000"

  search-indexer:
    build:
      context: .
      dockerfile: packages/search-indexer/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
      PAYLOAD_API_URL: http://api:3000/api
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - dokploy-network

volumes:
  mongo_data:
  redis_data:
  meili_data:

networks:
  dokploy-network:
    external: true
