services:
  # --- Infrastructure ---
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bns}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bns}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bns}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-production}
    volumes:
      - meili_data:/meili_data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- Application ---
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bns}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bns}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?Set PAYLOAD_SECRET}
      PAYLOAD_ALLOWED_ORIGINS: ${PAYLOAD_ALLOWED_ORIGINS:-https://buynsellem.com,https://www.buynsellem.com}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bns_api.rule=Host(`api.buynsellem.com`)"
      - "traefik.http.routers.bns_api.entrypoints=websecure"
      - "traefik.http.routers.bns_api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bns_api.service=bns_api"
      - "traefik.http.services.bns_api.loadbalancer.server.port=3000"

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.buynsellem.com
      NEXT_PUBLIC_CHAT_URL: https://chat.buynsellem.com
    depends_on:
      - api
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bns_web.rule=Host(`buynsellem.com`) || Host(`www.buynsellem.com`)"
      - "traefik.http.routers.bns_web.entrypoints=websecure"
      - "traefik.http.routers.bns_web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bns_web.service=bns_web"
      - "traefik.http.services.bns_web.loadbalancer.server.port=3001"

  chat-service:
    build:
      context: .
      dockerfile: packages/chat-service/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      PAYLOAD_API_URL: http://api:3000/api
      CORS_ORIGIN: https://buynsellem.com,https://www.buynsellem.com
      PORT: 4000
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bns_chat.rule=Host(`chat.buynsellem.com`)"
      - "traefik.http.routers.bns_chat.entrypoints=websecure"
      - "traefik.http.routers.bns_chat.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bns_chat.service=bns_chat"
      - "traefik.http.services.bns_chat.loadbalancer.server.port=4000"

  search-indexer:
    build:
      context: .
      dockerfile: packages/search-indexer/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
      PAYLOAD_API_URL: http://api:3000/api
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - dokploy-network

volumes:
  pg_data:
  redis_data:
  meili_data:

networks:
  dokploy-network:
    external: true
